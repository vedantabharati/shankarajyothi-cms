name: Daily Photo Backup

on:
  schedule:
    - cron: '0 3 * * *' # 3:00 AM UTC every day
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "${{ secrets.HOSTINGER_SSH_PORT }}" "${{ secrets.HOSTINGER_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync photos from Hostinger to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p "${{ secrets.HOSTINGER_SSH_PORT }}" \
            -o StrictHostKeyChecking=no \
            "${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}" \
            "~/bin/rclone sync '${{ secrets.PHOTOS_STORAGE_DIR }}' 'supabase-s3:${S3_BUCKET}/photos-backup/' \
              --transfers=4 \
              --stats-one-line \
              --log-level=INFO"
