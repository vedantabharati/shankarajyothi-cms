name: Daily Database Backup

on:
  schedule:
    - cron: '0 1 * * *' # 1:00 AM UTC every day
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          FILENAME="backup-$(date +%Y-%m-%d).sql.gz"
          pg_dump "$BACKUP_DATABASE_URL" | gzip > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "Backup created: $FILENAME ($(du -sh $FILENAME | cut -f1))"

      - name: Upload to Supabase S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          aws s3 cp "$BACKUP_FILE" \
            "s3://${S3_BUCKET}/db-backups/${BACKUP_FILE}" \
            --endpoint-url "$S3_ENDPOINT" \
            --region "$S3_REGION"
          echo "Uploaded to s3://${S3_BUCKET}/db-backups/${BACKUP_FILE}"

      - name: Delete backups older than 30 days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          CUTOFF=$(date -d '30 days ago' +%Y-%m-%d)
          aws s3 ls "s3://${S3_BUCKET}/db-backups/" \
            --endpoint-url "$S3_ENDPOINT" \
            --region "$S3_REGION" \
          | while read -r _ _ _ filename; do
            filedate=$(echo "$filename" | grep -oP '\d{4}-\d{2}-\d{2}')
            if [[ "$filedate" < "$CUTOFF" ]]; then
              aws s3 rm "s3://${S3_BUCKET}/db-backups/$filename" \
                --endpoint-url "$S3_ENDPOINT" \
                --region "$S3_REGION"
              echo "Deleted old backup: $filename"
            fi
          done
