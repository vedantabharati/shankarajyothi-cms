name: Production Deployment

on:
  push:
    branches: [ main ] # Change this if your primary branch is named differently

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        # Handles the AWS/Smithy peer dependency tree issues
        run: npm install --legacy-peer-deps

      - name: Build Next.js Application
        # Injecting your hPanel environment variables into the build process
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          PHOTO_STORAGE_DIR: ${{ secrets.PHOTO_STORAGE_DIR }}

      - name: Archive Production Artifacts
        # Zipping the pre-compiled files so Hostinger doesn't have to compile them
        run: tar -czf deploy.tar.gz .next public package.json package-lock.json next.config.mjs

      - name: Upload to Hostinger (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "deploy.tar.gz"
          target: "domains/shaankarajyoti.vedantabharati.org/nodejs" # Verified from your screenshot

      - name: Extract and Restart on Hostinger (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd domains/shaankarajyoti.vedantabharati.org/nodejs
            # 1. Clean up old build to prevent version conflicts
            rm -rf .next public
            # 2. Extract the new pre-compiled build
            tar -xzf deploy.tar.gz
            # 3. Install only production dependencies (faster and lighter)
            npm install --production --legacy-peer-deps
            # 4. Cleanup the archive
            rm deploy.tar.gz
            # 5. Signal Hostinger to restart the process
            mkdir -p tmp && touch tmp/restart.txt